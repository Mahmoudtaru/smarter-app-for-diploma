                    <section className="notes-hub-card p-4 sm:p-5 space-y-4">
                        <h3 className="text-xl font-bold text-[--accent-navy] dark:text-white flex items-center gap-2"><Icon name="plus-circle" className="text-[--accent-green]" /> أضف ملاحظة جديدة</h3>
                        <div className="grid md:grid-cols-2 gap-3"><select className="app-field" value={newWeek} onChange={e => setNewWeek(e.target.value)}>{lecturesData.map((week, index) => <option key={week.title} value={index}>الأسبوع {index + 1}</option>)}</select><select className="app-field" value={newLecture} onChange={e => setNewLecture(e.target.value)}>{(selectedWeek?.lectures || []).map(lecture => <option key={lecture.id} value={lecture.id}>{lecture.title}</option>)}</select></div>
                        <input className="app-field font-bold" value={newTitle} onChange={e => setNewTitle(e.target.value)} placeholder="عنوان الملاحظة" />
                        <textarea className="app-field min-h-[120px]" value={newText} onChange={e => setNewText(e.target.value)} placeholder="اكتب الملاحظة بالتفصيل..." />
                        <VoiceNoteTools onTranscript={appendTranscript} audioBlob={pendingAudioBlob} onAudioBlobChange={setPendingAudioBlob} />
                        <button onClick={addNew} className="btn-brand-primary px-5 py-3 rounded-lg font-bold inline-flex items-center gap-2"><Icon name="save" className="w-5 h-5" /> حفظ الملاحظة</button>
                        {message && <p className="text-sm font-bold text-[--accent-green]">{message}</p>}
                        {manualCopyText && <div className="manual-copy-box"><div className="flex justify-between mb-2"><strong>نسخ يدوي</strong><button onClick={() => setManualCopyText('')} className="text-red-500 font-bold">إغلاق</button></div><textarea readOnly value={manualCopyText} onFocus={e => e.target.select()} onClick={e => e.target.select()} /></div>}
                    </section>
                    <section className="grid sm:grid-cols-[1fr_220px] gap-3"><input className="app-field" value={query} onChange={e => setQuery(e.target.value)} placeholder="ابحث داخل ملاحظاتك..." /><select className="app-field" value={weekFilter} onChange={e => setWeekFilter(e.target.value)}><option value="all">كل الأسابيع</option>{lecturesData.map((week, index) => <option key={week.title} value={index}>الأسبوع {index + 1}</option>)}</select></section>
                    {Object.keys(grouped).length === 0 ? <div className="notes-empty-state p-8 text-center"><Icon name="notebook-pen" className="w-12 h-12 text-[--accent-green] mx-auto mb-3" /><h3 className="font-bold text-xl text-[--accent-navy] dark:text-white">مفيش ملاحظات مطابقة</h3><p className="text-gray-500 dark:text-gray-400 mt-1">ابدأ أول ملاحظة من فوق أو من داخل أي محاضرة.</p></div> : Object.keys(grouped).sort((a,b) => Number(a)-Number(b)).map(key => {
                        const week = lecturesData[Number(key)];
                        return <section key={key} className="space-y-3"><div className="flex items-center gap-3"><span className="note-week-badge px-3 py-1.5 rounded-full font-bold text-sm">الأسبوع {Number(key)+1}</span><h3 className="font-bold text-lg text-[--accent-navy] dark:text-white">{week?.title.replace(/^الأسبوع\s*\d+\s*:\s*/, '')}</h3></div><div className="grid lg:grid-cols-2 gap-4">{grouped[key].map(note => <article key={`${note.storageKey}-${note.id}`} className="notes-hub-card p-4 space-y-3"><div className="flex justify-between gap-3"><div><p className="text-xs text-[--accent-green] font-bold">{note.lectureTitle}</p><p className="text-[11px] text-gray-400 mt-1">آخر تعديل: {new Date(note.updatedAt || note.createdAt).toLocaleString('ar-EG')}</p></div><div className="flex gap-2"><button onClick={() => copyNote(note)} className="text-[--accent-green]" title="نسخ"><Icon name="copy" className="w-4 h-4" /></button><button onClick={() => removeNote(note)} className="text-red-500" title="حذف"><Icon name="trash-2" className="w-4 h-4" /></button></div></div><input className="app-field font-bold py-2" value={note.title} onChange={e => { updateStoredNote(note, { title: e.target.value }); setNotes(prev => prev.map(row => row.id === note.id && row.storageKey === note.storageKey ? { ...row, title: e.target.value } : row)); }} /><textarea className="app-field min-h-[130px] text-sm leading-relaxed" value={note.text || ''} placeholder={note.audioId ? 'أضف وصفًا للتسجيل الصوتي...' : 'محتوى الملاحظة'} onChange={e => { updateStoredNote(note, { text: e.target.value }); setNotes(prev => prev.map(row => row.id === note.id && row.storageKey === note.storageKey ? { ...row, text: e.target.value } : row)); }} /><AudioNotePlayer note={note} /></article>)}</div></section>;
                    })}
                </div>
            );
        };

        const StudentProfilePanel = ({ profile, onEditProfile }) => (
            <div className="student-profile-panel p-5 sm:p-6 mb-6 space-y-4">
                <div className="flex flex-col lg:flex-row lg:items-center gap-4">
                    <div className="profile-avatar !w-14 !h-14 !bg-[--accent-navy] text-xl">{profile.firstName.charAt(0)}</div>
                    <div className="flex-grow"><h3 className="text-xl font-bold text-[--accent-navy] dark:text-white">{profile.firstName}</h3><p className="text-sm text-gray-600 dark:text-gray-300">بدأت الرحلة يوم {formatArabicDate(profile.startDate)} · {profile.learningMode === 'live' ? 'دفعة لايف' : 'نسخة مسجلة'} · {profile.gender === 'female' ? 'مؤنث' : 'مذكر'}</p></div>
                    <button onClick={onEditProfile} className="btn-brand-navy px-4 py-2 rounded-lg font-bold inline-flex items-center justify-center gap-2"><Icon name="user-cog" className="w-4 h-4" /> تعديل بياناتي</button>
                </div>
                {profile.learningGoal && <div className="goal-profile-preview"><span className="font-bold text-[--accent-green]">هدفي:</span><p className="text-sm text-gray-700 dark:text-gray-200 mt-1 whitespace-pre-wrap">{profile.learningGoal}</p></div>}
            </div>
        );

        let youtubeApiPromise = null;
        const loadYouTubeIframeApi = () => {
            if (window.YT?.Player) return Promise.resolve(window.YT);
            if (youtubeApiPromise) return youtubeApiPromise;
            youtubeApiPromise = new Promise((resolve, reject) => {
                const previousReady = window.onYouTubeIframeAPIReady;
                window.onYouTubeIframeAPIReady = () => {
                    try { previousReady?.(); } catch (error) {}
                    resolve(window.YT);
                };
                if (!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')) {
                    const script = document.createElement('script');
                    script.src = 'https://www.youtube.com/iframe_api';
                    script.async = true;
                    script.onerror = () => reject(new Error('تعذر تحميل مشغل YouTube'));
                    document.head.appendChild(script);
                }
                window.setTimeout(() => { if (window.YT?.Player) resolve(window.YT); }, 1200);
            });
            return youtubeApiPromise;
        };

        const YouTubeLecturePlayer = ({ lecture }) => {
            const hostRef = useRef(null);
            const playerRef = useRef(null);
            const saveTimerRef = useRef(null);
            const positionKey = `smartYoutube:${lecture.id}:position`;
            const speedKey = 'smartYoutube:preferredSpeed';

            useEffect(() => {
                let cancelled = false;
                const saveProgress = () => {
                    const player = playerRef.current;
                    if (!player?.getCurrentTime) return;
                    try {
                        const current = player.getCurrentTime();
                        const duration = player.getDuration?.() || 0;
                        if (Number.isFinite(current) && current > 0 && (!duration || current < duration - 5)) localStorage.setItem(positionKey, String(current));
                        const rate = player.getPlaybackRate?.();
                        if (rate) localStorage.setItem(speedKey, String(rate));
                    } catch (error) {}
                };
                loadYouTubeIframeApi().then(YT => {
                    if (cancelled || !hostRef.current) return;
                    const startSeconds = Number(localStorage.getItem(positionKey) || 0);
                    playerRef.current = new YT.Player(hostRef.current, {
                        videoId: lecture.youtubeId,
                        width: '100%',
                        height: '100%',
                        playerVars: { playsinline: 1, rel: 0, enablejsapi: 1, origin: window.location.origin === 'null' ? undefined : window.location.origin },
                        events: {
                            onReady: event => {
                                try { event.target.getIframe?.().setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture; fullscreen'); } catch (error) {}
                                if (startSeconds > 5) event.target.seekTo(startSeconds, true);
                                const preferredRate = Number(localStorage.getItem(speedKey) || 1);
                                const rates = event.target.getAvailablePlaybackRates?.() || [];
                                if (rates.includes(preferredRate)) event.target.setPlaybackRate(preferredRate);
                            },
                            onStateChange: event => {
                                if (event.data === YT.PlayerState.PLAYING) {
                                    window.clearInterval(saveTimerRef.current);
                                    saveTimerRef.current = window.setInterval(saveProgress, 4000);
                                } else {
                                    window.clearInterval(saveTimerRef.current);
                                    saveProgress();
                                }
                                if (event.data === YT.PlayerState.ENDED) localStorage.removeItem(positionKey);
                            },
                            onPlaybackRateChange: saveProgress
                        }
                    });
                }).catch(() => {});
                const onPageHide = () => saveProgress();
                window.addEventListener('pagehide', onPageHide);
                document.addEventListener('visibilitychange', onPageHide);
                return () => {
                    cancelled = true;
                    saveProgress();
                    window.clearInterval(saveTimerRef.current);
                    window.removeEventListener('pagehide', onPageHide);
                    document.removeEventListener('visibilitychange', onPageHide);
                    try { playerRef.current?.destroy?.(); } catch (error) {}
                    playerRef.current = null;
                };
            }, [lecture.id, lecture.youtubeId]);

            return <div className="w-full h-full" ref={hostRef}></div>;
        };

        const FloatingLecturePlayer = ({ activeLecture, onClose }) => {
            const [isTheater, setIsTheater] = useState(true);
            const playerShellRef = useRef(null);
            useEffect(() => { if (activeLecture) setIsTheater(true); }, [activeLecture?.lecture?.id]);
            useEffect(() => {
                const unlockOrientation = () => { try { screen.orientation?.unlock?.(); } catch (error) {} };
                const onFullScreenChange = () => {
                    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
                    if (!isFs) unlockOrientation();
                };
                document.addEventListener('fullscreenchange', onFullScreenChange);
                document.addEventListener('webkitfullscreenchange', onFullScreenChange);
                return () => {
                    document.removeEventListener('fullscreenchange', onFullScreenChange);
                    document.removeEventListener('webkitfullscreenchange', onFullScreenChange);
                    unlockOrientation();
                };
            }, []);
            if (!activeLecture) return null;
            const { lecture, weekTitle } = activeLecture;
            const isYouTube = lecture.sourceType === 'youtube' || !!lecture.youtubeId;
            const previewUrl = !isYouTube ? (lecture.previewUrl || buildLecturePreviewUrl(lecture.fileId)) : '';
            const openFullScreen = async () => {
                const el = playerShellRef.current;
                if (!el) return;
                try {
                    if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: 'hide' });
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                } catch (error) {}
                try { await screen.orientation?.lock?.('landscape'); } catch (error) {}
            };
            return (
                <>
                    {isTheater && <button type="button" aria-label="تصغير المشغل" className="player-theater-backdrop" onClick={() => setIsTheater(false)}></button>}
                    <div ref={playerShellRef} className={`premium-floating-player ${isTheater ? 'theater' : ''}`}>
                        <div className="premium-floating-header">
                            <div className="min-w-0"><p className="text-sm sm:text-base font-bold truncate">{lecture.title}</p><p className="text-xs text-white/70 truncate">{weekTitle}</p></div>
                            <div className="flex items-center gap-1 flex-shrink-0">
                                <button type="button" onClick={openFullScreen} title="ملء الشاشة"><Icon name="monitor-up" className="w-4 h-4" /></button>
                                <button type="button" onClick={() => setIsTheater(prev => !prev)} title={isTheater ? 'تصغير داخل التطبيق' : 'فتح بحجم كبير'}><Icon name={isTheater ? 'minimize-2' : 'maximize-2'} className="w-4 h-4" /></button>
                                <button type="button" onClick={onClose} title="إغلاق المحاضرة"><Icon name="x" className="w-4 h-4" /></button>
                            </div>
                        </div>
                        <div className="floating-video-frame">
                            {isYouTube ? <YouTubeLecturePlayer key={lecture.id} lecture={lecture} /> : <iframe key={lecture.id} src={previewUrl} title={`${lecture.title} - مشغل المحاضرة`} loading="eager" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowFullScreen></iframe>}
                        </div>
                    </div>
                </>
            );
        };

        // Main App Component
        const App = () => {
            const [theme, setTheme] = useState('light');
            const [activeTab, setActiveTab] = useState('home');
            const [modalMessage, setModalMessage] = useState(null);
            const [taskFocusIndex, setTaskFocusIndex] = useState(null);
            const [lectureFocusIndex, setLectureFocusIndex] = useState(null);
            const [floatingLecture, setFloatingLecture] = useState(null);
            const [profile, setProfile] = useState(() => safeJsonParse(localStorage.getItem(PROFILE_KEY), null));
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [achievement, setAchievement] = useState(null);
            const currentWeekIndex = getCurrentWeekIndex(profile);

            useEffect(() => { const storedTheme = localStorage.getItem('theme'); const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches; setTheme(storedTheme === 'dark' || (!storedTheme && prefersDark) ? 'dark' : 'light'); }, []);
            useEffect(() => { if (theme === 'dark') document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); localStorage.setItem('theme', theme); }, [theme]);
            const saveProfile = (nextProfile) => { const normalized = { ...nextProfile, learningMode: nextProfile.learningMode || 'live' }; localStorage.setItem(PROFILE_KEY, JSON.stringify(normalized)); setProfile(normalized); setIsEditingProfile(false); };
            const celebrate = useCallback((type) => {
                if (!profile) return;
                const messages = {
                    lecture: { icon: 'headphones', title: `عاش يا ${profile.firstName}!`, text: `${getStudentWord(profile, 'خلصت', 'خلصتي')} محاضرة جديدة — خطوة جديدة تخلي استخدامك للـ AI أذكى وأقوى.` },
                    task: { icon: 'trophy', title: `برافو يا ${profile.firstName}!`, text: `${getStudentWord(profile, 'أنجزت', 'أنجزتي')} خطوة مهمة؛ التطبيق هو اللي بيحوّل المعلومة لمهارة.` },
                    note: { icon: 'notebook-pen', title: 'فكرة اتحفظت 💚', text: 'ملاحظتك بقت جزءًا من مكتبتك الشخصية، وتقدر ترجع لها وتطورها في أي وقت.' },
                    goal: { icon: 'target', title: `مراجعة مهمة يا ${profile.firstName}!`, text: `${getStudentWord(profile, 'وقفت', 'وقفتي')} وشفت وصلت لفين؛ وده جزء أساسي من رحلة التعلم.` }
                };
                setAchievement(messages[type] || messages.task);
            }, [profile]);
            const handleTabChange = useCallback((tabId) => { setActiveTab(tabId); window.scrollTo(0, 0); }, []);
            const navigate = useCallback((tabId, weekIndex = null) => {
                if (tabId === 'tasks' && weekIndex !== null) setTaskFocusIndex(weekIndex);
                if (tabId === 'lectures' && weekIndex !== null) setLectureFocusIndex(weekIndex);
                setActiveTab(tabId); window.scrollTo(0, 0);
            }, []);
            const handleOpenTaskWeek = useCallback((weekIndex) => { setTaskFocusIndex(weekIndex); setActiveTab('tasks'); window.setTimeout(() => document.getElementById(`task-week-${weekIndex}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120); }, []);
            const handleFloatLecture = useCallback(({ weekTitle, lecture }) => setFloatingLecture({ weekTitle, lecture }), []);
            const tabPanelClass = (tabId) => activeTab === tabId ? 'tab-content-anim' : 'tab-panel-hidden';
            return (
                <div id="app-content">
                    {(!profile || isEditingProfile) && <OnboardingModal initialProfile={isEditingProfile ? profile : null} onSave={saveProfile} onCancel={() => setIsEditingProfile(false)} />}
                    <AchievementToast achievement={achievement} onClose={() => setAchievement(null)} />
                    {modalMessage && <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[999] p-4" onClick={() => setModalMessage(null)}><div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-lg text-center w-full max-w-sm" onClick={e => e.stopPropagation()}><Icon name="info" className="w-14 h-14 text-[--accent-green] mx-auto mb-4" /><p className="text-gray-700 dark:text-gray-200 mb-6 leading-relaxed">{modalMessage}</p><button onClick={() => setModalMessage(null)} className="btn-action-gradient font-bold py-2.5 px-8 rounded-lg">تمام</button></div></div>}
                    <Header theme={theme} onThemeToggle={() => setTheme(prev => prev === 'light' ? 'dark' : 'light')} profile={profile} onEditProfile={() => setIsEditingProfile(true)} />
                    <main className="container mx-auto p-4 md:p-8 pb-28 relative">
                        {profile && <>
                            <div className={tabPanelClass('home')} aria-hidden={activeTab !== 'home'}><HomeTab profile={profile} currentWeekIndex={currentWeekIndex} onNavigate={navigate} onEditProfile={() => setIsEditingProfile(true)} onCelebrate={celebrate} /></div>
                            <div className={tabPanelClass('lectures')} aria-hidden={activeTab !== 'lectures'}><LecturesTab setModalMessage={setModalMessage} onOpenTaskWeek={handleOpenTaskWeek} onFloatLecture={handleFloatLecture} currentWeekIndex={currentWeekIndex} focusWeekIndex={lectureFocusIndex} onCelebrate={celebrate} /></div>
                            <div className={tabPanelClass('tasks')} aria-hidden={activeTab !== 'tasks'}><TasksTab setModalMessage={setModalMessage} focusWeekIndex={taskFocusIndex} currentWeekIndex={currentWeekIndex} onCelebrate={celebrate} /></div>
                            <div className={tabPanelClass('notes')} aria-hidden={activeTab !== 'notes'}><NotesHub profile={profile} onCelebrate={celebrate} /></div>
                            <div className={tabPanelClass('bonus')} aria-hidden={activeTab !== 'bonus'}><BonusTab /></div>
                            <div className={tabPanelClass('more')} aria-hidden={activeTab !== 'more'}><StudentProfilePanel profile={profile} onEditProfile={() => setIsEditingProfile(true)} /><MoreTab /></div>
                        </>}
                    </main>
                    <FloatingLecturePlayer activeLecture={floatingLecture} onClose={() => setFloatingLecture(null)} />
                    {profile && <BottomNav activeTab={activeTab} onTabChange={handleTabChange} />}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
    <script>
        function setupWelcomeScreen() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const appContent = document.getElementById('root');
            const startBtn = document.getElementById('start-btn');
            const titleEl = document.getElementById('welcome-title');
            const subtitleEl = document.getElementById('welcome-subtitle');
            const titleText = "Smarter With AI";
            const savedProfile = (() => { try { return JSON.parse(localStorage.getItem('smarterStudentProfileV1') || 'null'); } catch(e) { return null; } })();
            const subtitleText = savedProfile?.firstName ? `مبسوطين برجوعك يا ${savedProfile.firstName} 💚` : "مبسوطين إنك في الدبلومة معانا 💚";

            function applyTypewriter(element, text, speed, direction, callback) {
                let i = 0; element.innerHTML = "";
                element.classList.add('typewriter-anim', (direction === 'ltr' ? 'typewriter-ltr' : 'typewriter-rtl'));
                function type() {
                    if (i < text.length) { element.innerHTML += text.charAt(i); i++; setTimeout(type, speed); }
                    else { setTimeout(() => { element.classList.remove('typewriter-anim', 'typewriter-ltr', 'typewriter-rtl'); if (callback) callback(); }, 500); }
                }
                type();
            }

            setTimeout(() => {
                applyTypewriter(titleEl, titleText, 100, 'ltr', () => {
                    setTimeout(() => {
                        applyTypewriter(subtitleEl, subtitleText, 75, 'rtl', () => {
                            setTimeout(() => { startBtn.classList.remove('opacity-0'); startBtn.classList.add('animate-fadeInUp', 'pulse-animate'); }, 500);
                        });
                    }, 300);
                });
            }, 1500);

            startBtn.addEventListener('click', () => {
                welcomeScreen.classList.add('opacity-0');
                setTimeout(() => {
                    welcomeScreen.style.display = 'none';
                    if (appContent) appContent.classList.remove('hidden');
                }, 700);
            });
        }
        document.addEventListener('DOMContentLoaded', setupWelcomeScreen);
    </script>
</body>
</html>
